// Firebase & Storage Setup
const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
let db = null;
let auth = null;
let user = null;
const maxShifts = 5;
let savedShift = localStorage.getItem('nightHorror2_shift') ? parseInt(localStorage.getItem('nightHorror2_shift')) : 1;

const menuButtons = {
    start: { x: 50, y: 420, w: 250, h: 40, text: 'NEW SHIFT' },
    credits: { x: 50, y: 480, w: 250, h: 40, text: 'ARCHIVES' }
};

if (savedShift > 1 && savedShift <= maxShifts) {
    menuButtons.continue = { x: 50, y: 360, w: 250, h: 40, text: 'CONTINUE SHIFT ' + savedShift };
}

if (firebaseConfigStr) {
    try {
        const firebaseConfig = JSON.parse(firebaseConfigStr);
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (user && db) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'progress');
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        savedShift = snap.data().shift || 1;
                        if (savedShift > 1 && savedShift <= maxShifts) {
                            menuButtons.continue = { x: 50, y: 360, w: 250, h: 40, text: 'CONTINUE SHIFT ' + savedShift };
                        }
                    }
                } catch (e) { console.error("Error loading save:", e); }
            }
        });
    } catch (e) { console.error("Firebase init failed:", e); }
}

async function saveProgress(newShift) {
    savedShift = newShift;
    localStorage.setItem('nightHorror2_shift', savedShift);
    if (savedShift <= maxShifts) {
        menuButtons.continue = { x: 50, y: 360, w: 250, h: 40, text: 'CONTINUE SHIFT ' + savedShift };
    }
    if (!user || !db) return;
    try {
        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'saveData', 'progress'), { shift: newShift });
    } catch (e) { console.error("Error saving progress:", e); }
}

const keys = { w: false, a: false, s: false, d: false, e: false, f: false, escape: false, p: false };
const keysJustPressed = { e: false, f: false, escape: false, p: false };
const mouse = { x: 400, y: 300, clicked: false };

window.addEventListener('keydown', (e) => {
    if (gameState === 'ARCHIVES' && archivesSubState === 'EXTRAS' && isExtrasInputFocused) {
        if (e.key === 'Backspace') {
            redeemCodeInput = redeemCodeInput.slice(0, -1);
        } else if (e.key === 'Enter') {
            if (redeemCodeInput.toUpperCase() === 'NIGHTGUARD') {
                isCodeRedeemed = true;
            }
        } else if (e.key.length === 1 && redeemCodeInput.length < 15) {
            redeemCodeInput += e.key.toUpperCase();
        }
        return;
    }
    
    // Cheat code detection (BRYNGEL)
    if (gameState === 'PLAYING' || gameState === 'COMPUTER' || gameState === 'DIALOGUE') {
        cheatCodeInput += e.key.toUpperCase();
        if (cheatCodeInput.length > 7) cheatCodeInput = cheatCodeInput.slice(-7);
        if (cheatCodeInput === 'BRYNGEL') {
            isCheatActive = true;
            cheatCodeInput = ""; // Reset after activation
        }
    }

    const key = e.key.toLowerCase();
    if (keys.hasOwnProperty(key)) {
        if (!keys[key] && (key === 'e' || key === 'f' || key === 'escape' || key === 'p')) keysJustPressed[key] = true;
        keys[key] = true;
    }
});
window.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (keys.hasOwnProperty(key)) keys[key] = false;
});
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});
canvas.addEventListener('mousedown', (e) => { if (e.button === 0) mouse.clicked = true; });

function spawnNPC() {
    const isMonster = Math.random() < 0.3 + (shift * 0.08);
    const isExpired = Math.random() < 0.25;

    let npcReason = "";

    if (isMonster) {
        const allNames = [...namesG1, ...namesG2, ...namesG3];
        npcName = allNames[Math.floor(Math.random() * allNames.length)];
        npcReason = reasonsG3[Math.floor(Math.random() * reasonsG3.length)];
    } else {
        const isGroup1 = Math.random() < 0.6; 
        if (isGroup1) {
            npcName = namesG1[Math.floor(Math.random() * namesG1.length)];
            npcReason = reasonsG1[Math.floor(Math.random() * reasonsG1.length)];
        } else {

}

function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
}

function getDist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function getCenter(obj) { return { x: obj.x + obj.w / 2, y: obj.y + obj.h / 2 }; }

function isHit(btn) { return mouse.x > btn.x && mouse.x < btn.x+btn.w && mouse.y > btn.y && mouse.y < btn.y+btn.h; }
const isMenuHit = (btn) => mouse.x > btn.x && mouse.x < btn.x+btn.w && mouse.y > btn.y-30 && mouse.y < btn.y+10;

function canMove(newX, newY) {
    if (newX < 0 || newX + player.w > GAME_W || newY < 0 || newY + player.h > GAME_H) return false;
    if (rectIntersect(newX, newY, player.w, player.h, desk.x, desk.y, desk.w, desk.h)) return false;
    for (let s of shelves) if (rectIntersect(newX, newY, player.w, player.h, s.x, s.y, s.w, s.h)) return false;

    // Office Walls
    const t = 10;
    if (rectIntersect(newX, newY, player.w, player.h, office.x, office.y, office.w, t)) return false;
    if (rectIntersect(newX, newY, player.w, player.h, office.x, office.y, t, office.h)) return false;
    if (rectIntersect(newX, newY, player.w, player.h, office.x + office.w - t, office.y, t, office.h)) return false;
    if (rectIntersect(newX, newY, player.w, player.h, office.x, office.y + office.h - t, door.x - office.x, t)) return false;
    if (rectIntersect(newX, newY, player.w, player.h, door.x + door.w, office.y + office.h - t, (office.x + office.w) - (door.x + door.w), t)) return false;
    
    // Doors / Barricades
    if ((door.isClosed || door.barricaded) && rectIntersect(newX, newY, player.w, player.h, door.x, door.y, door.w, door.h)) return false;
    
    // Gate/Fences
    if (rectIntersect(newX, newY, player.w, player.h, fenceTop.x, fenceTop.y, fenceTop.w, fenceTop.h)) return false;
    if (rectIntersect(newX, newY, player.w, player.h, fenceBottom.x, fenceBottom.y, fenceBottom.w, fenceBottom.h)) return false;
    if (!gateObj.open && rectIntersect(newX, newY, player.w, player.h, gateObj.x, gateObj.y, gateObj.w, gateObj.h)) return false;

    return true;
}

    gameOverReason = reason;

function getAMTime(secs) {
    let hour = Math.floor(secs / 60);
    if (hour === 0) return "12 AM";
    if (hour === 6) return "6 AM";
    return hour + " AM";
}

function update(dt) {
    let fPressed = keysJustPressed['f'];
    let ePressed = keysJustPressed['e'];
    let escPressed = keysJustPressed['escape'] || keysJustPressed['p'];
    keysJustPressed['e'] = false;
    keysJustPressed['f'] = false;
    keysJustPressed['escape'] = false;
    keysJustPressed['p'] = false;

    if (escPressed) {
        const pausableStates = ['PLAYING', 'DIALOGUE', 'COMPUTER', 'LOCKDOWN_ALARM', 'ATTACK_REACT'];
        if (pausableStates.includes(gameState)) {
            previousGameState = gameState;
            gameState = 'PAUSED';
            pauseSubState = 'MAIN';
        } else if (gameState === 'PAUSED') {
            if (pauseSubState === 'MAIN') {
                gameState = previousGameState;
            } else {
                pauseSubState = 'MAIN';
            }
        }
    }

    if (gameState === 'PAUSED') {
        if (mouse.clicked) {
            if (pauseSubState === 'MAIN') {
                if (isHit({x: GAME_W/2 - 150, y: 200, w: 300, h: 40})) pauseSubState = 'CONTROLS';
                if (isHit({x: GAME_W/2 - 150, y: 260, w: 300, h: 40})) pauseSubState = 'MESSAGE';
                if (isHit({x: GAME_W/2 - 150, y: 320, w: 300, h: 40})) gameState = previousGameState;
                if (isHit({x: GAME_W/2 - 150, y: 380, w: 300, h: 40})) gameState = 'MENU';
            } else {
                if (isHit({x: GAME_W/2 - 100, y: 500, w: 200, h: 40})) pauseSubState = 'MAIN';
            }
        }
        mouse.clicked = false; 
        return;
    }

    if (gameState === 'MENU') {
        if (mouse.clicked && isMenuHit(menuButtons.start)) { shift = 1; gameState = 'MESSAGE'; }
        if (mouse.clicked && isMenuHit(menuButtons.credits)) { gameState = 'ARCHIVES'; archivesSubState = 'MAIN'; }
        if (mouse.clicked && menuButtons.continue && isMenuHit(menuButtons.continue)) { 
            shift = savedShift; 
            gameState = 'MESSAGE'; 
        }
        mouse.clicked = false; return;
    }
    if (gameState === 'MESSAGE') {
        if (mouse.clicked || ePressed) startShift();
        mouse.clicked = false; return;
    }
    if (gameState === 'ARCHIVES') {
        if (mouse.clicked) {
            if (archivesSubState === 'MAIN') {
                if (isHit({x: GAME_W/2 - 150, y: 200, w: 300, h: 40})) archivesSubState = 'NOTES';
                if (isHit({x: GAME_W/2 - 150, y: 260, w: 300, h: 40})) archivesSubState = 'CREDITS';
                if (isHit({x: GAME_W/2 - 150, y: 320, w: 300, h: 40})) archivesSubState = 'EXTRAS';
                if (isHit({x: GAME_W/2 - 100, y: 500, w: 200, h: 40})) gameState = 'MENU';
            } else if (archivesSubState === 'NOTES') {
                for (let i = 1; i <= maxShifts; i++) {
                    if (i <= savedShift) {
                        if (isHit({x: 100, y: 150 + (i-1)*50, w: 200, h: 40})) selectedNoteShift = i;
                    }
                }
                if (isHit({x: GAME_W/2 - 100, y: 500, w: 200, h: 40})) archivesSubState = 'MAIN';
            } else if (archivesSubState === 'CREDITS') {
                if (isHit({x: GAME_W/2 - 100, y: 500, w: 200, h: 40})) archivesSubState = 'MAIN';
            } else if (archivesSubState === 'EXTRAS') {
                if (isHit({x: GAME_W/2 - 150, y: 230, w: 300, h: 50})) isExtrasInputFocused = true;
                else isExtrasInputFocused = false;

                if (isCodeRedeemed && isHit({x: GAME_W/2 - 150, y: 380, w: 300, h: 40})) archivesSubState = 'SHIFT_SELECT';
                if (isHit({x: GAME_W/2 - 100, y: 500, w: 200, h: 40})) archivesSubState = 'MAIN';
            } else if (archivesSubState === 'SHIFT_SELECT') {
                for (let i = 1; i <= 5; i++) {
                    if (isHit({x: GAME_W/2 - 100, y: 150 + (i-1)*60, w: 200, h: 50})) {
                        shift = i;
                        savedShift = Math.max(savedShift, i);
                        localStorage.setItem('nightHorror2_shift', savedShift);
                        gameState = 'MESSAGE';
                    }
                }
                if (isHit({x: GAME_W/2 - 100, y: 500, w: 200, h: 40})) archivesSubState = 'MAIN';
            }
        }
        mouse.clicked = false; return;
    }
    if (gameState === 'START') {
        if (mouse.clicked || ePressed) gameState = 'PLAYING';
        mouse.clicked = false; return;
    }
    if (gameState === 'JUMPSCARE') {
        jumpscareTimer -= dt;
        if (jumpscareTimer <= 0) gameState = 'GAME_OVER';
        return;
    }
    if (gameState === 'GAME_OVER') {
        if (mouse.clicked || ePressed) { shift = 1; gameState = 'MENU'; }
        mouse.clicked = false; return;
    }
    if (gameState === 'WIN') {
        const bx = GAME_W/2 - 150;
        const by = 450;
        const bw = 300;
        const bh = 50;
        if (mouse.clicked && mouse.x > bx && mouse.x < bx + bw && mouse.y > by && mouse.y < by + bh) {
            startEndingCutscene();
        }
        mouse.clicked = false; return;
    }
    if (gameState === 'ENDING_CUTSCENE') {
        cutsceneTimer += dt;
        if (cutsceneStage === 0) {
            cutscenePlayerX += 120 * dt;
            if (cutscenePlayerX >= GAME_W - 150) {
                cutscenePlayerX = GAME_W - 150;
                cutsceneStage = 1;
                cutsceneTimer = 0;
            }
        } else if (cutsceneStage === 1) {
            if (cutsceneTimer > 1) {
                cutsceneStalkerX += 180 * dt;
                if (cutsceneStalkerX >= 150) {
                    cutsceneStalkerX = 150;
                    cutsceneStage = 2;
                    cutsceneTimer = 0;
                }
            }
        } else if (cutsceneStage === 2) {
            if (cutsceneTimer > 1.5) {
                if (!cutsceneMonsterMode) {
                    cutsceneMonsterMode = true;
                    cutsceneShake = 15;
                }
                if (cutsceneTimer > 4.5) {
                    cutsceneStage = 3;
                    cutsceneTimer = 0;
                }
            }
        } else if (cutsceneStage === 3) {
            if (mouse.clicked || ePressed) {
                shift = 1;
                gameState = 'MENU';
            }
        }
        
        // Update jumping NPCs
        cutsceneNPCs.forEach(n => {
            n.jump += n.jumpSpeed * dt;
            if (cutsceneMonsterMode) n.isMonster = true;
        });
        
        if (cutsceneShake > 0) cutsceneShake -= 30 * dt;
        mouse.clicked = false; return;
    }
    if (gameState === 'SHIFT_COMPLETE') {
        if (mouse.clicked) {
            if (isHit({x: GAME_W/2 - 100, y: 400, w: 200, h: 40})) { 
                shift++; if (shift > maxShifts) gameState = 'WIN'; else gameState = 'MESSAGE';
            }
            if (isHit({x: GAME_W/2 - 100, y: 460, w: 200, h: 40})) { 
                shift++; if (shift > maxShifts) gameState = 'WIN'; else gameState = 'MENU';
            }
        }
        mouse.clicked = false; return;
    }
    if (gameState === 'GREY_SCREEN') {
        greyScreenTimer -= dt;
        if (greyScreenTimer <= 0) { gameState = 'PLAYING'; door.isClosed = false; emergencyTriggered = false; currentNPC = null; }
        return;
    }
    if (gameState === 'GREY_SCREEN_LOCKDOWN_START') {
        greyScreenTimer -= dt;
        if (greyScreenTimer <= 0) { gameState = 'LOCKDOWN_ALARM'; lockdownTimer = 20; }
        return;
    }
    if (gameState === 'GREY_SCREEN_LOCKDOWN_END') {
        greyScreenTimer -= dt;
        if (greyScreenTimer <= 0) { 
            gameState = 'PLAYING'; 
            monstersLetIn = 0;
            lockdownTimer = 0;
            emergencyTriggered = false;
            door.barricaded = false;
            windowObj.barricaded = false;
            door.barricadeProgress = 0;
            windowObj.barricadeProgress = 0;
            door.isClosed = false;
            currentNPC = null;
            horde = [];
        }
        return;
    }

    // Timer Logic - Freeze time while NPC is waiting for a decision
    let freezeTime = (currentNPC && currentNPC.state === 'WAITING');
    if (!freezeTime && (gameState === 'PLAYING' || gameState === 'ATTACK_REACT' || gameState === 'LOCKDOWN_ALARM' || gameState === 'DIALOGUE' || gameState === 'COMPUTER')) {
        shiftTimeElapsed += dt * (isCheatActive ? 6 : 1);
        if (shiftTimeElapsed >= SHIFT_DURATION) {
            gameState = 'SHIFT_COMPLETE';
            if (shift < maxShifts) saveProgress(shift + 1); else saveProgress(1);
            return;
        }
    }

    // Global Attack Timer 
    if (attackTimer > 0) {
        attackTimer -= dt;
        if (attackTimer <= 0) { triggerGameOver("The intruder breached the office."); return; }
        if (door.isClosed && emergencyTriggered) {
            gameState = 'GREY_SCREEN';
            greyScreenTimer = 2.5; 
            attackTimer = 0;
            emergencyTriggered = false;
        }
    }

    const pCenter = getCenter(player);

    // Player Movement
    if (gameState !== 'DIALOGUE' && gameState !== 'COMPUTER' && gameState !== 'GENERATOR_ATTACK') {
        let dx = 0, dy = 0;
        if (keys['w']) dy -= player.speed * dt;
        if (keys['s']) dy += player.speed * dt;
        if (keys['a']) dx -= player.speed * dt;
        if (keys['d']) dx += player.speed * dt;
        if (dx !== 0 && canMove(player.x + dx, player.y)) player.x += dx;
        if (dy !== 0 && canMove(player.x, player.y + dy)) player.y += dy;
    }

    // Barricade Mechanics / Shelf Fill / Generator (Holding E)
    if (keys['e']) {
        if (gameState === 'PLAYING' || gameState === 'ATTACK_REACT' || gameState === 'LOCKDOWN_ALARM') {
            shelves.forEach(s => {
                if (getDist(pCenter.x, pCenter.y, s.x+s.w/2, s.y+s.h/2) < 80) s.stock = Math.min(100, s.stock + 40 * dt);
            });
            if (getDist(pCenter.x, pCenter.y, generator.x+generator.w/2, generator.y+generator.h/2) < 80) {
                power = Math.min(100, power + 1 * dt);
                if (currentNPC && currentNPC.state === 'WAITING' && currentNPC.isMonster && !currentNPC.generatorChecked) {
                    currentNPC.generatorChecked = true;
                    if (Math.random() < 0.25) {
                        gameState = 'GENERATOR_ATTACK';
                        currentNPC.animX = windowObj.x + windowObj.w/2;
                        currentNPC.animY = windowObj.y - 25;
                    }
                }
            }
        }
        if (gameState === 'LOCKDOWN_ALARM') {
            if (getDist(pCenter.x, pCenter.y, door.x+door.w/2, door.y) < 90) door.barricadeProgress += dt * 2;
            if (getDist(pCenter.x, pCenter.y, windowObj.x+windowObj.w/2, windowObj.y) < 90) windowObj.barricadeProgress += dt * 2;
        }
    }

    // Auto-complete Barricade
    if (door.barricadeProgress >= 5) door.barricaded = true;
    if (windowObj.barricadeProgress >= 5) windowObj.barricaded = true;

    // Gate update
    gateObj.open = (currentNPC && currentNPC.state === 'LEAVING_ACCEPTED');

    if (currentNPC) {
        currentNPC.wobble += 5 * dt;
        if (currentNPC.state === 'WALKING_IN') {
            currentNPC.y += 60 * dt;
            if (currentNPC.y >= windowObj.y - 25) { 
                currentNPC.y = windowObj.y - 25; 
                currentNPC.state = 'WAITING'; 
                if (!currentNPC.hasTakenFood) {
                    currentNPC.hasTakenFood = true;
                    const shelf = shelves[currentNPC.targetShelfIndex];
                    if (shelf.stock <= 0) {
                        if (Math.random() < 0.5) currentNPC.hidesReason = true;
                    } else {
                        shelf.stock -= 25; 
                        if (shelf.stock < 0) shelf.stock = 0;
                    }
                }
            }
        } else if (currentNPC.state === 'LEAVING_DENIED') {
            currentNPC.x -= 120 * dt; if (currentNPC.x < -50) currentNPC = null;
        } else if (currentNPC.state === 'LEAVING_ACCEPTED') {
            currentNPC.x += 120 * dt; if (currentNPC.x > GAME_W + 50) currentNPC = null;
        }
    } else if (gameState === 'PLAYING' || gameState === 'LOCKDOWN_ALARM') {
        npcSpawnTimer -= dt;
        if (npcSpawnTimer <= 0 && lockdownTimer <= 0) { spawnNPC(); npcSpawnTimer = Math.random() * 5 + 5; }
    }

    // Horde animation
    if (gameState === 'LOCKDOWN_ALARM') {
        horde.forEach(m => m.wobble += 5 * dt);
    }

    // Door Toggling (E press)
    if ((gameState === 'PLAYING' || gameState === 'ATTACK_REACT') && ePressed) {
        if (getDist(pCenter.x, pCenter.y, door.x+door.w/2, door.y) < 90) {
            if (!door.isClosed && rectIntersect(player.x, player.y, player.w, player.h, door.x, door.y, door.w, door.h)) {
                // Player is in the way, push them out
                if (pCenter.y < door.y + door.h/2) {
                    player.y = door.y - player.h - 1;
                } else {
                    player.y = door.y + door.h + 1;
                }
            }
            door.isClosed = !door.isClosed;
        }
    }

    // Interactive Logic
    if (gameState === 'PLAYING' || gameState === 'ATTACK_REACT' || gameState === 'LOCKDOWN_ALARM') {
        if (gameState !== 'LOCKDOWN_ALARM' && currentNPC && currentNPC.state === 'WAITING' && ePressed && getDist(pCenter.x, pCenter.y, windowObj.x+windowObj.w/2, windowObj.y) < 100) {
            gameState = 'DIALOGUE';
        }
        if (fPressed && getDist(pCenter.x, pCenter.y, desk.x+desk.w/2, desk.y+desk.h/2) < 90) {
            if (power >= 1) {
                power -= 1;
                gameState = 'COMPUTER';
            }
        }
    } else if (gameState === 'DIALOGUE') {
        if (fPressed) {
            if (power >= 1) {
                power -= 1;
                gameState = 'COMPUTER';
            }
        }
        else if (ePressed) gameState = 'PLAYING';
    } else if (gameState === 'COMPUTER') {
        if (ePressed || fPressed) {
            gameState = lockdownTimer > 0 ? 'LOCKDOWN_ALARM' : (attackTimer > 0 ? 'ATTACK_REACT' : 'PLAYING');
        }
        
        // Accept/Deny Buttons Logic (Only accessible if NPC is waiting)
        if (currentNPC && currentNPC.state === 'WAITING' && attackTimer <= 0 && lockdownTimer <= 0) {
            if (mouse.clicked && isHit(buttons.accept)) {
                if (currentNPC.isMonster) {
                    monstersLetIn++;
                    if (monstersLetIn >= 3) { 
                        gameState = 'GREY_SCREEN_LOCKDOWN_START'; 
                        greyScreenTimer = 1.5; 
                        // Spawn Monster Horde for lockdown
                        horde = [];
                        for(let i=0; i<60; i++) {
                            let hx = Math.random() * 470; // Map area left of the gate fence
                            let hy = Math.random() * GAME_H;
                            if (!rectIntersect(hx, hy, 20, 20, office.x, office.y, office.w, office.h)) {
                                horde.push({x: hx, y: hy, wobble: Math.random() * 10});
                            }
                        }
                    }
                    else { currentNPC.state = 'LEAVING_ACCEPTED'; gameState = 'PLAYING'; }
                } else { currentNPC.state = 'LEAVING_ACCEPTED'; gameState = 'PLAYING'; }
            }
            if (mouse.clicked && isHit(buttons.deny)) {
                if (currentNPC.isMonster) { gameState = 'ATTACK_REACT'; attackTimer = 10; currentNPC.state = 'ATTACKING'; }
                else { currentNPC.state = 'LEAVING_DENIED'; gameState = 'PLAYING'; }
            }
        }
        
        // Emergency button can only be clicked if threat is active
        if (mouse.clicked && isHit(buttons.emergency)) {
            if (attackTimer > 0 || lockdownTimer > 0) {
                emergencyTriggered = true;
                if (lockdownTimer > 0) {
                    door.barricaded = true; 
                    windowObj.barricaded = true;
                }
            }
        }
    }

    if (gameState === 'GENERATOR_ATTACK') {
        let speed = 200 * dt;
        if (currentNPC.animX > generator.x + generator.w/2) {
            currentNPC.animX -= speed;
        } else if (currentNPC.animY < generator.y + generator.h/2) {
            currentNPC.animY += speed;
        } else {
            triggerGameOver("The monster caught you at the generator!");
        }
    }

    if (door.isClosed && power > 0) {
        power -= 1 * dt;
        if (power <= 0) {
            power = 0;
            door.isClosed = false;
        }
    }

    if (gameState === 'LOCKDOWN_ALARM') {
        lockdownTimer -= dt;
        if (lockdownTimer <= 0) triggerGameOver("Overrun by escaped patients.");
        // Protect yourself -> reset lockdown, resume shift
        if (door.barricaded && windowObj.barricaded) { 
            gameState = 'GREY_SCREEN_LOCKDOWN_END';
            greyScreenTimer = 2.0;
        }
    }
    mouse.clicked = false;
}

    if (gameState === 'ARCHIVES') {

            btns.forEach(b => {

                ctx.fillRect(GAME_W/2 - 150, b.y, 300, 40);
                ctx.fillStyle = isHit({x: GAME_W/2 - 150, y: b.y, w: 300, h: 40}) ? '#000' : '#0f0';
                ctx.font = '20px "Courier New"'; ctx.fillText(b.text, GAME_W/2, b.y + 28);
            });
        } else if (archivesSubState === 'NOTES') {

            ctx.fillStyle = isHit({x: GAME_W/2 - 100, y: 500, w: 200, h: 40}) ? '#000' : '#0f0';

        } else if (archivesSubState === 'EXTRAS') {

            ctx.strokeStyle = isExtrasInputFocused ? '#fff' : '#0f0'; 
            ctx.lineWidth = isExtrasInputFocused ? 3 : 1;
            ctx.strokeRect(GAME_W/2 - 150, 230, 300, 50);
            ctx.lineWidth = 1;
            ctx.font = '30px "Courier New"'; ctx.fillText(redeemCodeInput + (isExtrasInputFocused && Math.floor(Date.now()/500)%2 ? '_' : ''), GAME_W/2, 265);
            ctx.font = '14px "Courier New"'; ctx.fillText(isExtrasInputFocused ? 'Type the code and press ENTER' : 'Click the box to type', GAME_W/2, 310);
            
            if (isCodeRedeemed) {
                ctx.fillStyle = '#0f0'; ctx.font = '14px "Courier New"';
                ctx.fillText('CODE ACCEPTED! SHIFT SELECT UNLOCKED.', GAME_W/2, 350);
                ctx.fillStyle = isHit({x: GAME_W/2 - 150, y: 380, w: 300, h: 40}) ? '#0f0' : '#040';
                ctx.fillRect(GAME_W/2 - 150, 380, 300, 40);

            ctx.fillText('BACK', GAME_W/2, 528);
        } else if (archivesSubState === 'SHIFT_SELECT') {

        ctx.arc(GAME_W/2 + 60 + jx, GAME_H/2 - 40 + jy, 10, 0, Math.PI*2); ctx.fill();

        ctx.fillRect(mx + 40, my - 100, 120, 100); // Head

        ctx.font = 'bold 60px "Courier New"'; ctx.fillText('NIGHT HORROR 2', 45, 120);
        ctx.fillStyle = '#900'; ctx.font = 'bold 50px "Courier New"'; ctx.fillText('ASYLUM', 45, 175);

        const drawM = (btn) => {
            const h = isMenuHit(btn);
            ctx.fillStyle = h ? '#fff' : '#666'; ctx.font = 'bold 30px "Courier New"';
            ctx.fillText((h ? '> ' : '') + btn.text, btn.x, btn.y);
        };
        
        if (menuButtons.continue) drawM(menuButtons.continue);
        drawM(menuButtons.start); drawM(menuButtons.credits); 
        return;
    }

    if (gameState === 'START') {
        ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='30px Courier';
        ctx.fillText(`SHIFT ${shift} STARTING`, GAME_W/2, 280);
        ctx.font='18px Courier'; ctx.fillText('Press [E] to begin', GAME_W/2, 320);
        return;
    }

    if (gameState === 'SHIFT_COMPLETE') {
        ctx.fillStyle='#0f0'; ctx.textAlign='center'; ctx.font='bold 40px Courier';
        ctx.fillText(`YOU SURVIVED SHIFT ${shift}!`, GAME_W/2, 200);
        const drawBtn = (x, y, text) => {
            const hit = mouse.x > x && mouse.x < x+200 && mouse.y > y && mouse.y < y+40;
            ctx.fillStyle = hit ? '#333' : '#222'; ctx.fillRect(x, y, 200, 40);
            ctx.fillStyle = '#fff'; ctx.font = '20px Courier'; ctx.fillText(text, x + 100, y + 27);
        };
        drawBtn(GAME_W/2 - 100, 400, 'NEXT SHIFT'); drawBtn(GAME_W/2 - 100, 460, 'RETURN TO MENU');
        return;
    }

    if (gameState === 'GAME_OVER') {
        ctx.fillStyle='#900'; ctx.textAlign='center'; ctx.font='bold 50px Courier';
        ctx.fillText('TERMINATED', GAME_W/2, 280);
        ctx.fillStyle='#fff'; ctx.font='16px Courier'; ctx.fillText(gameOverReason, GAME_W/2, 320);
        return;
    }

    if (gameState === 'WIN') {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, GAME_W, GAME_H);
        
        // Background static/glitch
        ctx.fillStyle = 'rgba(0, 255, 0, 0.05)';
        for(let i=0; i<100; i++) ctx.fillRect(Math.random()*GAME_W, Math.random()*GAME_H, 2, 2);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 50px "Courier New"';
        ctx.fillText('CONGRATULATIONS', GAME_W/2, 150);
        
        ctx.font = '24px "Courier New"';
        ctx.fillStyle = '#fff';
        ctx.fillText('YOU SURVIVED THE ASYLUM', GAME_W/2, 220);
        
        ctx.font = '16px "Courier New"';
        ctx.fillStyle = '#888';
        ctx.fillText('The Safe Haven is secure... for now.', GAME_W/2, 260);
        
        ctx.font = '18px "Courier New"';
        ctx.fillStyle = '#0f0';
        ctx.fillText('All 5 Shifts Completed Successfully', GAME_W/2, 320);
        
        ctx.font = '14px "Courier New"';
        ctx.fillStyle = '#555';
        ctx.fillText('MADE BY Player1Zayn', GAME_W/2, 360);

        // Back to menu button
        const bx = GAME_W/2 - 150;
        const by = 450;
        const bw = 300;
        const bh = 50;
        const hit = mouse.x > bx && mouse.x < bx + bw && mouse.y > by && mouse.y < by + bh;
        
        ctx.fillStyle = hit ? '#0f0' : '#040';
        ctx.fillRect(bx, by, bw, bh);
        ctx.fillStyle = hit ? '#000' : '#0f0';
        ctx.font = 'bold 20px "Courier New"';
        ctx.fillText('CONTINUE', GAME_W/2, by + 32);
        
        return;
    }

    if (gameState === 'ENDING_CUTSCENE') {
        ctx.save();
        if (cutsceneShake > 0) ctx.translate(Math.random()*cutsceneShake*2-cutsceneShake, Math.random()*cutsceneShake*2-cutsceneShake);
        
        // Grass
        ctx.fillStyle = '#1a3d1a';
        ctx.fillRect(0, 0, GAME_W, 250);
        ctx.fillRect(0, 350, GAME_W, 250);
        
        // Path
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 250, GAME_W, 100);
        
        // Houses
        for(let i=0; i<6; i++) {
            const hx = 30 + i*140;
            ctx.fillStyle = '#422';
            ctx.fillRect(hx, 100, 80, 60);
            ctx.fillStyle = '#633';
            ctx.beginPath(); ctx.moveTo(hx-10, 100); ctx.lineTo(hx+40, 60); ctx.lineTo(hx+90, 100); ctx.fill();
            ctx.fillStyle = '#ff0'; ctx.fillRect(hx+15, 115, 15, 15); ctx.fillRect(hx+50, 115, 15, 15);
        }
        
        // NPCs
        cutsceneNPCs.forEach(n => {
            const jy = Math.abs(Math.sin(n.jump)) * 25;
            const y = n.y - jy;
            if (n.isMonster) {
                ctx.fillStyle = '#000'; ctx.fillRect(n.x-12, y-12, 24, 24);
                ctx.fillStyle = '#f00'; ctx.fillRect(n.x-8, y-8, 5, 5); ctx.fillRect(n.x+3, y-8, 5, 5);
            } else {
                ctx.fillStyle = '#d4c5b0'; ctx.fillRect(n.x-8, y-15, 16, 15); // Head
                ctx.fillStyle = '#1a2b4c'; ctx.fillRect(n.x-10, y, 20, 20); // Body
            }
        });
        
        // Player
        const py = 280;
        ctx.fillStyle = '#1a2b4c'; ctx.fillRect(cutscenePlayerX-10, py, 20, 20); // Body
        ctx.fillStyle = '#d4c5b0'; ctx.fillRect(cutscenePlayerX-6, py-10, 12, 10); // Head
        
        // Stalker
        if (cutsceneStage >= 1) {
            const sy = 280;
            if (cutsceneMonsterMode) {
                ctx.fillStyle = '#000'; ctx.fillRect(cutsceneStalkerX-15, sy-5, 30, 30);
                ctx.fillStyle = '#f00'; ctx.fillRect(cutsceneStalkerX-10, sy, 8, 8); ctx.fillRect(cutsceneStalkerX+2, sy, 8, 8);
            } else {
                ctx.fillStyle = '#1a2b4c'; ctx.fillRect(cutsceneStalkerX-10, sy, 20, 20); // Body
                ctx.fillStyle = '#d4c5b0'; ctx.fillRect(cutsceneStalkerX-6, sy-10, 12, 10); // Head
            }
        }
        
        if (cutsceneStage === 3) {
            ctx.fillStyle = 'rgba(0,0,0,0.9)';
            ctx.fillRect(0, 0, GAME_W, GAME_H);
            ctx.fillStyle = '#f00';
            ctx.font = 'bold 60px Courier';
            ctx.textAlign = 'center';
            ctx.fillText('TO BE CONTINUED', GAME_W/2, GAME_H/2);
            ctx.fillStyle = '#fff';
            ctx.font = '20px Courier';
            ctx.fillText('Press any key to return to menu', GAME_W/2, GAME_H/2 + 80);
        }
        
        ctx.restore();
        return;
    }

    // --- APPLY SCREEN SHAKE FOR EVERYTHING (Main Game + UI) ---
    ctx.save();
    if (attackTimer > 0 || lockdownTimer > 0) ctx.translate(Math.random()*8-4, Math.random()*8-4);

    // Main World
    const pCenter = getCenter(player);

    ctx.fillStyle = '#111311'; ctx.fillRect(0, 0, GAME_W, GAME_H);
    
    // Draw Paths
    ctx.fillStyle = '#181a18'; // Path color
    ctx.fillRect(370, 0, 60, 200); // Path from top to window
    ctx.fillRect(0, 140, 370, 60); // Path to the left
    ctx.fillRect(430, 140, GAME_W - 430, 60); // Path to the right (through gate)

    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(380, 0, 40, office.y);

    // Fences
    const drawFence = (fObj) => {
        ctx.fillStyle = '#444'; ctx.fillRect(fObj.x, fObj.y, fObj.w, fObj.h);
        ctx.fillStyle = '#222'; for(let fy = fObj.y + 10; fy < fObj.y + fObj.h; fy += 20) ctx.fillRect(fObj.x-2, fy, fObj.w+4, 4);
    }
    drawFence(fenceTop); drawFence(fenceBottom);
    if (!gateObj.open) drawFence(gateObj);

    // Draw Lockdown Horde Map Overlay
    if (gameState === 'LOCKDOWN_ALARM' && horde.length > 0) {
        ctx.fillStyle = '#411';
        horde.forEach(m => {
            let ny = m.y + Math.sin(m.wobble)*3;
            ctx.fillStyle = '#411'; ctx.fillRect(m.x, ny, 20, 20); // Body
            ctx.fillStyle = '#000'; ctx.fillRect(m.x+4, ny-10, 12, 10); // Head
            ctx.fillStyle = '#fff'; ctx.fillRect(m.x+5, ny-7, 3, 3); ctx.fillRect(m.x+12, ny-7, 3, 3); // Eyes
        });
    }

    // Draw Main NPC
    if (currentNPC && gameState !== 'GENERATOR_ATTACK') {
        ctx.fillStyle = currentNPC.state === 'ATTACKING' ? '#411' : '#a89f91';
        let nx = currentNPC.x, ny = currentNPC.y;
        if (currentNPC.state === 'WALKING_IN' || currentNPC.state.includes('LEAVING')) ny += Math.sin(currentNPC.wobble)*3;
        
        ctx.fillRect(nx, ny, currentNPC.w, currentNPC.h); // Square Body
        if (currentNPC.state === 'ATTACKING') {
            ctx.fillStyle = '#000'; ctx.fillRect(nx+4, ny-10, 12, 10); // Black Head
            ctx.fillStyle = '#fff'; ctx.fillRect(nx+5, ny-7, 3, 3); ctx.fillRect(nx+12, ny-7, 3, 3); // White Eyes
        } else {
            ctx.fillStyle = '#d4c5b0'; ctx.fillRect(nx+4, ny-10, 12, 10); // Normal Square Head
        }
    }

    ctx.fillStyle = '#2d302f'; ctx.fillRect(office.x, office.y, office.w, office.h);
    ctx.strokeStyle = '#111'; ctx.lineWidth=8; ctx.strokeRect(office.x, office.y, office.w, office.h);
    
    ctx.fillStyle = windowObj.barricaded ? '#311' : '#1d3945'; ctx.fillRect(windowObj.x, windowObj.y, windowObj.w, windowObj.h);
    ctx.fillStyle = door.barricaded ? '#311' : (door.isClosed ? '#421' : '#000'); ctx.fillRect(door.x, door.y, door.w, door.h);
    
    ctx.fillStyle = '#222'; ctx.fillRect(desk.x, desk.y, desk.w, desk.h);
    
    // Draw Detailed Generator
    ctx.fillStyle = '#333'; ctx.fillRect(generator.x, generator.y, generator.w, generator.h);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.strokeRect(generator.x, generator.y, generator.w, generator.h);
    
    // Generator Screen
    ctx.fillStyle = '#000'; ctx.fillRect(generator.x + 5, generator.y + 5, 30, 20);
    ctx.fillStyle = '#f90'; ctx.font = 'bold 10px Courier'; ctx.textAlign = 'center';
    ctx.fillText(Math.floor(power) + "%", generator.x + 20, generator.y + 18);
    
    // Generator Wires
    ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(generator.x + 20, generator.y + 40); ctx.lineTo(generator.x + 20, generator.y + 60); ctx.stroke();
    
    // Draw a more detailed computer
    // Monitor
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(desk.x + 15, desk.y + 5, 60, 40); // Monitor body
    ctx.fillStyle = '#000'; ctx.fillRect(desk.x + 18, desk.y + 8, 54, 34); // Screen bezel
    
    // Screen Glow
    const screenColor = isCheatActive ? '#f0f' : '#0c4';
    ctx.fillStyle = screenColor; 
    if(Math.random()>0.05) ctx.fillRect(desk.x + 21, desk.y + 11, 48, 28); 
    
    // Keyboard
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(desk.x + 10, desk.y + 45, 70, 12); 
    ctx.fillStyle = '#222';
    for(let i=0; i<5; i++) ctx.fillRect(desk.x + 12 + i*14, desk.y + 47, 10, 8); // Keys
    
    // Mouse
    ctx.fillStyle = '#111'; ctx.fillRect(desk.x + 85, desk.y + 45, 12, 12);
    ctx.strokeStyle = '#000'; ctx.beginPath(); ctx.moveTo(desk.x + 91, desk.y + 45); ctx.lineTo(desk.x + 91, desk.y + 40); ctx.stroke(); // Mouse wire

    shelves.forEach(s => {
        ctx.fillStyle = '#2b2118'; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = '#888';
        for(let i=0; i<Math.floor(s.stock/10); i++) ctx.fillRect(s.x+5+(i%2)*20, s.y+10+Math.floor(i/2)*15, 12, 10);
        if (s.stock < 30 && Math.floor(Date.now()/300)%2===0) { ctx.fillStyle='#f00'; ctx.font='12px Courier'; ctx.fillText('LOW', s.x+10, s.y-5); }
    });

    // Barricade Progress Bars
    if (door.barricadeProgress > 0 && !door.barricaded) {
        ctx.fillStyle = '#fff'; ctx.fillRect(door.x, door.y + 20, 100, 5);
        ctx.fillStyle = '#0f0'; ctx.fillRect(door.x, door.y + 20, (door.barricadeProgress/5)*100, 5);
    }
    if (windowObj.barricadeProgress > 0 && !windowObj.barricaded) {
        ctx.fillStyle = '#fff'; ctx.fillRect(windowObj.x, windowObj.y - 10, 100, 5);
        ctx.fillStyle = '#0f0'; ctx.fillRect(windowObj.x, windowObj.y - 10, (windowObj.barricadeProgress/5)*100, 5);
    }

    // Guard Body 
    ctx.save();
    ctx.translate(pCenter.x, pCenter.y);
    ctx.fillStyle = '#1a2b4c'; ctx.fillRect(-10, -10, 20, 20); // Dark Blue Uniform Body
    ctx.fillStyle = '#d4c5b0'; ctx.fillRect(-6, -20, 12, 10); // Skin tone head
    ctx.fillStyle = '#0f192e'; ctx.fillRect(-8, -22, 16, 5); // Dark blue cap top
    ctx.fillRect(-10, -19, 20, 2); // Cap brim
    ctx.fillStyle = '#ffd700'; ctx.fillRect(3, -6, 5, 6); // Yellow Badge
    ctx.restore();

    if (gameState === 'GENERATOR_ATTACK') {
        ctx.fillStyle = '#000';
        ctx.fillRect(currentNPC.animX - 15, currentNPC.animY - 15, 30, 30);
        ctx.fillStyle = '#f00';
        ctx.fillRect(currentNPC.animX - 10, currentNPC.animY - 10, 8, 8);
        ctx.fillRect(currentNPC.animX + 2, currentNPC.animY - 10, 8, 8);
    }

    // UI Overlays
    ctx.fillStyle = '#0f0'; ctx.font = '20px Courier'; ctx.textAlign = 'right';
    ctx.fillText(`POWER: ${Math.floor(power)}%`, GAME_W - 20, 30);

    if (gameState === 'DIALOGUE') {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(100, 420, 600, 120);
        ctx.fillStyle = '#fff'; ctx.font='18px Courier'; ctx.textAlign='left';
        ctx.fillText(`ID: ${currentNPC.name}`, 120, 450);
        
        const reasonText = currentNPC.hidesReason ? "... (Refuses to speak)" : currentNPC.reason;
        if (currentNPC.hidesReason) ctx.fillStyle = '#aaa';
        ctx.fillText(`Reason: ${reasonText}`, 120, 480);
        
        ctx.fillStyle='#0ff'; ctx.fillText('[F] Use Computer | [E] Close', 120, 520);
    }
    
    if (gameState === 'COMPUTER') {
        // Draw a retro CRT monitor bezel
        ctx.fillStyle='#111'; ctx.fillRect(130, 80, 540, 490); // Outer bezel
        ctx.fillStyle='#222'; ctx.fillRect(140, 90, 520, 470); // Inner bezel
        
        // Screen background
        ctx.fillStyle='#010'; ctx.fillRect(150, 100, 500, 450);
        
        // Scanlines effect
        ctx.fillStyle='rgba(0, 255, 0, 0.05)';
        for(let i=100; i<550; i+=4) ctx.fillRect(150, i, 500, 2);
        
        ctx.strokeStyle='#0f0'; ctx.lineWidth=2; ctx.strokeRect(150,100,500,450);
        ctx.fillStyle='#0f0'; ctx.font='bold 24px Courier'; ctx.textAlign='center';
        ctx.fillText('ASYLUM DATABASE OS v2.1', 400, 140);
        ctx.fillRect(170, 155, 460, 2); // Separator line
        
        const dr = (b) => { 
            const isEmergHit = (b === buttons.emergency && emergencyTriggered);
            ctx.fillStyle = isEmergHit ? '#400' : '#020'; ctx.fillRect(b.x,b.y,b.w,b.h); 
            ctx.strokeStyle = isEmergHit ? '#f00' : '#0f0'; ctx.lineWidth=2; ctx.strokeRect(b.x,b.y,b.w,b.h); 
            ctx.fillStyle = isEmergHit ? '#f00' : '#0f0'; ctx.textAlign='center'; 
            ctx.font='bold 18px Courier'; ctx.fillText(b.text, b.x+b.w/2, b.y+26); 
        };
        
        if (currentNPC && currentNPC.state === 'WAITING' && lockdownTimer <= 0 && attackTimer <= 0) {
            ctx.textAlign='left'; 
            ctx.fillStyle='#0f0'; ctx.font='18px Courier';
            ctx.fillText(`Subject: ${currentNPC.name}`, 180, 200);
            ctx.fillText(`ID: ${currentNPC.idNumber}`, 180, 230);
            const isExp = currentNPC.expYear < 2026;
            ctx.fillStyle = isExp ? '#f00' : '#0f0';
            ctx.fillText(`ID Date: ${currentNPC.expYear} ${isExp ? '(Expired)' : ''}`, 180, 260);
            
            // Blinking cursor
            if (Math.floor(performance.now() / 500) % 2 === 0) {
                ctx.fillStyle='#0f0';
                ctx.fillRect(180, 280, 10, 20);
            }
            
            dr(buttons.accept); dr(buttons.deny);
        } else if (lockdownTimer <= 0 && attackTimer <= 0) {
            // No NPC waiting, display no info.
            ctx.textAlign='center';
            ctx.fillStyle='#f00'; ctx.font='18px Courier';
            ctx.fillText("NO PENDING REQUESTS", 400, 280);
            if (Math.floor(performance.now() / 500) % 2 === 0) {
                ctx.fillRect(390, 300, 20, 4);
            }
        }
        
        // Draw Emergency Button Based on Threat
        const isThreatActive = (attackTimer > 0 || lockdownTimer > 0);
        if (isThreatActive) {
            dr(buttons.emergency);
        } else {
            // Greyed out emergency button
            ctx.fillStyle = '#111'; ctx.fillRect(buttons.emergency.x, buttons.emergency.y, buttons.emergency.w, buttons.emergency.h);
            ctx.strokeStyle = '#333'; ctx.lineWidth=2; ctx.strokeRect(buttons.emergency.x, buttons.emergency.y, buttons.emergency.w, buttons.emergency.h);
            ctx.fillStyle = '#555'; ctx.textAlign='center'; ctx.font='bold 18px Courier';
            ctx.fillText(buttons.emergency.text, buttons.emergency.x + buttons.emergency.w/2, buttons.emergency.y + 26);
        }
        
        ctx.lineWidth=1; // Reset line width
        
        if (lockdownTimer > 0) {
            ctx.fillStyle = '#f00'; ctx.font = '24px Courier'; ctx.textAlign='center';
            ctx.fillText("LOCKDOWN PROTOCOL ACTIVE", 400, 250);
            ctx.fillText("CLICK EMERGENCY TO SEAL DOORS", 400, 290);
        }
    }
    if (gameState === 'LOCKDOWN_ALARM') {
        ctx.fillStyle = 'rgba(255, 0, 0, 0.2)'; ctx.fillRect(0, 0, GAME_W, GAME_H);
        ctx.fillStyle = '#f00'; ctx.textAlign = 'center'; ctx.font = 'bold 30px Courier';
        if (Math.floor(Date.now() / 500) % 2 === 0) ctx.fillText("LOCKDOWN - HOLD 'E' OR USE PC!", GAME_W/2, 100);
    }

    // Restore screen shake state
    ctx.restore();

    // HUD & Keytips (Unshaken for readability)
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='16px Courier';
    ctx.fillText(`SHIFT ${shift} | TIME: ${getAMTime(shiftTimeElapsed)}`, 20, 30);
    
    // Timer paused text
    if (currentNPC && currentNPC.state === 'WAITING' && attackTimer <= 0 && lockdownTimer <= 0) {
        ctx.fillStyle = '#ff0'; ctx.fillText(`[TIMER PAUSED - DECISION PENDING]`, 250, 30);
    }

    // Keytips in Bottom Left Corner
    if (gameState === 'PLAYING' || gameState === 'ATTACK_REACT') {
        ctx.fillStyle = '#0f0';
        let keyTipY = GAME_H - 20;
        
        const distDesk = getDist(pCenter.x, pCenter.y, desk.x+desk.w/2, desk.y+desk.h/2);
        const distWindow = getDist(pCenter.x, pCenter.y, windowObj.x+windowObj.w/2, windowObj.y);
        const distDoor = getDist(pCenter.x, pCenter.y, door.x+door.w/2, door.y);

        if (distDesk < 90) {
            ctx.fillText("[F] Open Computer", 20, keyTipY);
            keyTipY -= 20;
        }
        if (currentNPC && currentNPC.state === 'WAITING' && distWindow < 100) {
            ctx.fillText("[E] Interact", 20, keyTipY);
            keyTipY -= 20;
        }
        if (distDoor < 90) {
            ctx.fillText("[E] Toggle Door", 20, keyTipY);
            keyTipY -= 20;
        }
        let nearShelf = false;
        shelves.forEach(s => {
            if (getDist(pCenter.x, pCenter.y, s.x+s.w/2, s.y+s.h/2) < 80) nearShelf = true;
        });
        if (nearShelf) {
            ctx.fillText("[Hold E] Refill Shelf", 20, keyTipY);
            keyTipY -= 20;
        }
        if (getDist(pCenter.x, pCenter.y, generator.x+generator.w/2, generator.y+generator.h/2) < 80) {
            ctx.fillText("[Hold E] Crank Generator", 20, keyTipY);
            keyTipY -= 20;
        }
    }

    if (gameState === 'PAUSED') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(0, 0, GAME_W, GAME_H);

        const drawBtn = (x, y, w, h, text) => {
            const hit = mouse.x > x && mouse.x < x+w && mouse.y > y && mouse.y < y+h;
            ctx.fillStyle = hit ? '#333' : '#222'; ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = '#0f0'; ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = '#fff'; ctx.font = '20px Courier';
            ctx.textAlign = 'center';
            ctx.fillText(text, x + w/2, y + h/2 + 6);
        };

        if (pauseSubState === 'MAIN') {
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.font = 'bold 40px "Courier New"';
            ctx.fillText("PAUSED", GAME_W/2, 100);

            drawBtn(GAME_W/2 - 150, 200, 300, 40, 'CONTROLS');
            drawBtn(GAME_W/2 - 150, 260, 300, 40, 'MESSAGE FROM MNGT');
            drawBtn(GAME_W/2 - 150, 320, 300, 40, 'RESUME');
            drawBtn(GAME_W/2 - 150, 380, 300, 40, 'MAIN MENU');
        } else if (pauseSubState === 'CONTROLS') {
            ctx.fillStyle = '#0f0';
            ctx.textAlign = 'center';
            ctx.font = 'bold 30px "Courier New"';
            ctx.fillText("CONTROLS", GAME_W/2, 100);

            ctx.fillStyle = '#fff';
            ctx.font = '18px "Courier New"';
            ctx.fillText("W,A,S,D - Move", GAME_W/2, 160);
            ctx.fillText("E - Interact / Toggle Door", GAME_W/2, 190);
            ctx.fillText("Hold E - Refill Shelf", GAME_W/2, 220);
            ctx.fillText("F - Open Computer", GAME_W/2, 250);
            ctx.fillText("ESC/P - Pause", GAME_W/2, 280);

            drawBtn(GAME_W/2 - 100, 500, 200, 40, 'BACK');
        } else if (pauseSubState === 'MESSAGE') {
            ctx.fillStyle = '#0f0';
            ctx.textAlign = 'center';
            ctx.font = 'bold 30px "Courier New"';
            ctx.fillText("CURRENT DIRECTIVE", GAME_W/2, 100);

            ctx.fillStyle = '#ccc';
            ctx.font = '16px "Courier New"';
            const lines = getShiftMessage(shift);
            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], GAME_W/2, 150 + (i * 22));
            }

            drawBtn(GAME_W/2 - 100, 500, 200, 40, 'BACK');
        }
    }
    ctx.restore();
}

function gameLoop() {
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>

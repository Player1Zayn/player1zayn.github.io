<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Banana Casino</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    #wheel {
      transition-property: transform;
      transition-duration: 4000ms;
      transition-timing-function: cubic-bezier(0.15, 0, 0.15, 1);
    }
    #leaderboard-container::-webkit-scrollbar,
    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    #leaderboard-container::-webkit-scrollbar-track,
    .custom-scroll::-webkit-scrollbar-track {
      background: rgba(6, 78, 59, 0.1);
    }
    #leaderboard-container::-webkit-scrollbar-thumb,
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #facc15;
      border-radius: 10px;
    }
  </style>
</head>
<body class="fixed inset-0 bg-black text-white font-sans overflow-hidden select-none flex items-center justify-center">

  <div id="loading-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center text-yellow-400 font-bold text-2xl z-50">
    Loading Casino...
  </div>

  <div id="app" class="w-full h-full max-w-[1600px] bg-emerald-950 relative shadow-2xl flex flex-col hidden">
    
    <!-- VIEW: MENU -->
    <div id="view-menu" class="flex-1 flex flex-col items-center justify-center bg-gradient-to-b from-emerald-900 to-emerald-950 text-center hidden p-4">
      <h1 class="text-5xl md:text-7xl font-black text-yellow-400 mb-2 drop-shadow-xl">BANANA<br/>CASINO</h1>
      <p class="text-emerald-300 mb-8 md:mb-12 text-lg md:text-xl font-medium">Spin the wheel. Grow the trees.</p>
      <div class="flex flex-col gap-4 w-full max-w-[250px]">
        <button onclick="setView('name_entry')" class="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-bold text-xl md:text-2xl py-3 md:py-4 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          START
        </button>
        <button onclick="setView('credits')" class="bg-emerald-800 hover:bg-emerald-700 text-emerald-100 font-bold text-base md:text-lg py-3 rounded-xl flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" x1="16" x2="12" y2="12"></line><line x1="12" x1="8" x2="12.01" y2="8"></line></svg>
          CREDITS
        </button>
      </div>
    </div>

    <!-- VIEW: CREDITS -->
    <div id="view-credits" class="flex-1 flex flex-col items-center justify-center bg-emerald-950 text-center p-6 hidden">
      <h2 class="text-3xl md:text-4xl font-bold text-yellow-400 mb-8 underline decoration-emerald-500">CREDITS</h2>
      <div class="bg-emerald-900 p-6 md:p-8 rounded-2xl w-full max-w-md border border-emerald-800 shadow-xl">
        <p class="text-lg md:text-xl text-emerald-100 mb-4">Made by <span class="font-bold text-white">Zayn Lilak</span></p>
        <p class="text-emerald-300/80 text-xs md:text-sm italic">Banana trademark from wilhelm.toverland.se</p>
      </div>
      <button onclick="setView('menu')" class="mt-8 bg-emerald-800 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-xl">Back to Menu</button>
    </div>

    <!-- VIEW: NAME ENTRY -->
    <div id="view-name_entry" class="flex-1 flex flex-col items-center justify-center bg-emerald-950 p-4 md:p-6 hidden">
      <div class="bg-emerald-900 p-6 md:p-8 rounded-3xl w-full max-w-[90%] md:max-w-md shadow-2xl border border-emerald-800 text-center">
        <h2 class="text-2xl md:text-3xl font-bold text-yellow-400 mb-6">Casino ID</h2>
        <input 
          type="text" 
          id="player-name-input"
          maxlength="15"
          placeholder="Enter Your Name..."
          class="w-full bg-emerald-950 border-2 border-emerald-700 text-white text-lg md:text-xl p-3 md:p-4 rounded-xl text-center mb-6 focus:border-yellow-400 outline-none"
        />
        <button 
          onclick="enterCasino()"
          class="w-full bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-bold text-lg md:text-xl py-3 md:py-4 rounded-xl transition-transform active:scale-95"
        >
          Enter Casino
        </button>
      </div>
    </div>

    <!-- VIEW: GAME -->
    <div id="view-game" class="flex-1 flex flex-col md:flex-row overflow-hidden hidden">
      
      <!-- Right Sidebar (Moved to Top on Mobile): Trees -->
      <div class="order-1 md:order-3 md:w-1/4 bg-emerald-900/50 border-b md:border-b-0 md:border-l border-emerald-800 flex flex-col shrink-0 z-20">
        <!-- Top Bar inside Trees / Balance -->
        <div class="p-3 md:p-6 bg-emerald-900 border-b border-emerald-800 flex flex-row md:flex-col items-center justify-between md:justify-center">
          <div class="text-left md:text-center">
            <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest md:mb-1"><span id="display-player-name">Player</span>'s Balance</p>
            <div id="display-bananas" class="text-2xl sm:text-3xl md:text-5xl font-black text-yellow-400 drop-shadow-lg leading-none">0 🍌</div>
          </div>
          <!-- Mobile Buy Tree Button -->
          <button
            onclick="handleBuyTree()"
            id="buy-tree-btn-mobile"
            class="md:hidden px-4 py-2 rounded-xl font-black transition-all flex flex-col items-center justify-center shadow-lg bg-emerald-800/50 text-emerald-700 ml-4 h-full"
            disabled
          >
            <span id="buy-tree-title-mobile" class="text-sm">BUY TREE</span>
            <span id="buy-tree-subtitle-mobile" class="text-[10px] opacity-70">(-100 🍌)</span>
          </button>
        </div>
        
        <!-- Trees Grid Area -->
        <div class="p-3 md:p-6 md:flex-1 md:overflow-y-auto custom-scroll flex flex-col">
          <div class="flex justify-between items-center mb-2 md:mb-6">
            <h3 class="font-bold text-emerald-100 flex items-center gap-1 md:gap-2 text-xs md:text-base">
              <svg class="text-emerald-400 w-4 h-4 md:w-5 md:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 14 4-4 4 4"></path><path d="m7 19 5-5 5 5"></path><path d="m7 9 5-5 5 5"></path><path d="M12 19v3"></path></svg>
              TREES (<span id="display-trees">1</span>/10)
            </h3>
            <span class="text-[10px] text-emerald-400 font-bold">+<span id="display-tree-income">1</span> 🍌/5s</span>
          </div>
          
          <div id="tree-grid" class="grid grid-cols-5 md:grid-cols-2 gap-1.5 md:gap-3 mb-0 md:mb-8 shrink-0"></div>
          
          <!-- Desktop Buy Tree Button -->
          <button
            onclick="handleBuyTree()"
            id="buy-tree-btn"
            class="hidden md:flex w-full py-4 rounded-xl font-black transition-all flex-col items-center justify-center shadow-lg bg-emerald-800/50 text-emerald-700 mt-auto"
            disabled
          >
            <span id="buy-tree-title" class="text-lg">BUY TREE</span>
            <span id="buy-tree-subtitle" class="text-xs opacity-70">(-100 🍌)</span>
          </button>
        </div>
      </div>

      <!-- Middle: The Wheel -->
      <div class="order-2 md:order-2 flex-1 flex flex-col bg-emerald-950 overflow-hidden relative border-y md:border-y-0 md:border-x border-emerald-800/30">
        <!-- Overlay HUD: Exit and Version -->
        <div class="absolute top-0 left-0 right-0 p-2 md:p-4 flex justify-between items-center z-30 pointer-events-none">
          <button onclick="setView('menu')" class="pointer-events-auto text-emerald-500 hover:text-emerald-300 text-xs md:text-sm font-bold bg-emerald-950/80 px-2 py-1 md:px-0 md:py-0 md:bg-transparent rounded">← EXIT</button>
          <div onclick="handleVersionClick()" class="pointer-events-auto cursor-pointer text-emerald-500 text-[10px] md:text-xs font-mono uppercase py-1 select-none bg-emerald-950/80 px-2 md:px-0 md:bg-transparent rounded" title="Game Version">V1.7 Fix Enabled</div>
        </div>
        
        <!-- Wheel Area -->
        <div class="flex-1 flex flex-col items-center justify-center p-2 min-h-0 relative">
          <div class="relative w-48 h-48 sm:w-64 sm:h-64 lg:w-96 lg:h-96 rounded-full border-[8px] md:border-[12px] border-yellow-500 shadow-[0_0_30px_rgba(0,0,0,0.6)] flex items-center justify-center overflow-visible shrink-0 mt-6 md:mt-0">
            <div id="wheel" class="w-full h-full rounded-full"></div>
            <div class="absolute w-8 h-8 md:w-12 md:h-12 bg-yellow-500 rounded-full border-2 md:border-4 border-yellow-600 shadow-xl z-10"></div>
            <div class="absolute -top-4 md:-top-6 left-1/2 -ml-3 md:-ml-4 w-6 h-8 md:w-8 md:h-10 bg-white shadow-lg z-20" style="clip-path: polygon(50% 100%, 0 0, 100% 0)"></div>
          </div>
          <div id="spin-result-msg" class="mt-2 md:mt-8 h-8 md:h-10 text-base sm:text-xl md:text-2xl font-black text-center text-yellow-400 drop-shadow-md px-2 w-full truncate"></div>
        </div>

        <!-- Bottom: Betting -->
        <div class="bg-emerald-900/90 backdrop-blur-md p-3 md:p-6 border-t-2 md:border-t-4 border-yellow-500/20 z-20 shrink-0">
          <div class="max-w-md mx-auto space-y-2 md:space-y-4">
            <div class="flex gap-1.5 md:gap-2 h-12 md:h-14">
              <button onclick="setBetColor('red')" id="bet-btn-red" class="flex-1 rounded-lg md:rounded-xl font-black uppercase transition-all border-2 text-xs md:text-sm bg-red-500 bg-opacity-30 border-transparent leading-tight">
                RED<br/><span class="text-[8px] md:text-[10px] opacity-70">1X PAY</span>
              </button>
              <button onclick="setBetColor('green')" id="bet-btn-green" class="flex-1 rounded-lg md:rounded-xl font-black uppercase transition-all border-2 text-xs md:text-sm bg-green-500 bg-opacity-30 border-transparent leading-tight">
                GREEN<br/><span class="text-[8px] md:text-[10px] opacity-70">3X PAY</span>
              </button>
              <button onclick="setBetColor('black')" id="bet-btn-black" class="flex-1 rounded-lg md:rounded-xl font-black uppercase transition-all border-2 text-xs md:text-sm bg-slate-900 bg-opacity-30 border-transparent leading-tight">
                BLACK<br/><span class="text-[8px] md:text-[10px] opacity-70">1X PAY</span>
              </button>
            </div>
            <div class="flex gap-1.5 md:gap-2 h-10 md:h-auto">
              <input 
                type="number" 
                id="bet-amount-input"
                class="flex-1 bg-emerald-950 border border-emerald-800 text-yellow-400 text-base md:text-xl font-mono p-2 md:p-3 rounded-lg md:rounded-xl focus:border-yellow-400 outline-none"
                placeholder="Bet Amount..."
              />
              <button onclick="setMaxBet()" id="max-bet-btn" class="bg-emerald-800 px-3 md:px-4 rounded-lg md:rounded-xl font-bold text-xs md:text-base hover:bg-emerald-700 active:scale-95">MAX</button>
            </div>
            <button 
              onclick="handleSpin()"
              id="spin-btn"
              class="w-full py-3 md:py-5 rounded-xl md:rounded-2xl font-black text-xl md:text-3xl shadow-xl transition-all active:scale-95 bg-emerald-800 text-emerald-900"
              disabled
            >
              SPIN
            </button>
          </div>
        </div>
      </div>

      <!-- Left Sidebar (Moved to Bottom on Mobile): Scoreboard -->
      <div class="order-3 md:order-1 md:w-1/4 bg-emerald-900/50 border-t md:border-t-0 md:border-r border-emerald-800 flex flex-col h-[20vh] md:h-full shrink-0">
        <div class="p-2 md:p-4 bg-emerald-900 border-b border-emerald-800 flex items-center justify-center md:justify-start gap-2">
          <svg class="text-yellow-400 w-4 h-4 md:w-6 md:h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
          <h2 class="font-bold text-yellow-400 text-xs md:text-sm uppercase tracking-widest">Global Scoreboard</h2>
        </div>
        <div id="leaderboard-container" class="flex-1 overflow-y-auto p-2 md:p-4 space-y-1.5 md:space-y-2 custom-scroll">
          <div class="text-center text-emerald-600 text-xs py-10 italic">Connecting...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const supabaseUrl = "https://yuwnnaavbegzbdfpxjok.supabase.co"; 
    const supabaseKey = "sb_publishable_dApo1jlVE15-s7RTzmnpOA_cBDuQy1W"; 
    let supabaseClient = null;

    let view = 'menu';
    let userId = '';
    let playerName = '';
    let bananas = 0;
    let trees = 1;
    let leaderboard = [];
    
    let betAmount = 0;
    let betColor = null; 
    let isSpinning = false;
    let wheelRotation = 0;
    let spinResultMsg = '';

    let syncTimeout = null;
    let gameLoopInterval = null;

    const elApp = document.getElementById('app');
    const elLoading = document.getElementById('loading-screen');
    const views = {
      menu: document.getElementById('view-menu'),
      credits: document.getElementById('view-credits'),
      name_entry: document.getElementById('view-name_entry'),
      game: document.getElementById('view-game')
    };
    
    const elPlayerNameInput = document.getElementById('player-name-input');
    const elDisplayPlayerName = document.getElementById('display-player-name');
    const elDisplayBananas = document.getElementById('display-bananas');
    const elDisplayTrees = document.getElementById('display-trees');
    const elDisplayTreeIncome = document.getElementById('display-tree-income');
    const elTreeGrid = document.getElementById('tree-grid');
    
    const elBuyTreeBtnDesktop = document.getElementById('buy-tree-btn');
    const elBuyTreeTitleDesktop = document.getElementById('buy-tree-title');
    const elBuyTreeSubtitleDesktop = document.getElementById('buy-tree-subtitle');
    
    const elBuyTreeBtnMobile = document.getElementById('buy-tree-btn-mobile');
    const elBuyTreeTitleMobile = document.getElementById('buy-tree-title-mobile');
    const elBuyTreeSubtitleMobile = document.getElementById('buy-tree-subtitle-mobile');
    
    const elWheel = document.getElementById('wheel');
    const elSpinResultMsg = document.getElementById('spin-result-msg');
    const elBetBtns = {
      red: document.getElementById('bet-btn-red'),
      green: document.getElementById('bet-btn-green'),
      black: document.getElementById('bet-btn-black')
    };
    const elBetAmountInput = document.getElementById('bet-amount-input');
    const elMaxBetBtn = document.getElementById('max-bet-btn');
    const elSpinBtn = document.getElementById('spin-btn');
    const elLeaderboardContainer = document.getElementById('leaderboard-container');

    function generateId() {
      return 'user_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
    }

    window.onload = async () => {
      elWheel.style.background = getWheelBackground();
      loadPersistentData();
      if (window.supabase && supabaseUrl && supabaseKey) {
        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        await fetchServerState(); // Make sure server overrides local before starting
        setupSupabaseListeners();
      }
      elBetAmountInput.addEventListener('input', (e) => {
        let val = parseInt(e.target.value) || 0;
        val = Math.max(0, Math.min(bananas, val));
        betAmount = val;
        e.target.value = val || '';
        updateGameUI();
      });
      elLoading.classList.add('hidden');
      elApp.classList.remove('hidden');
      setView('menu');
      renderTreeGrid();
    };

    function loadPersistentData() {
      const saved = localStorage.getItem('bananaCasinoSave');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          userId = data.userId || generateId();
          playerName = data.name || '';
          bananas = typeof data.bananas === 'number' ? data.bananas : 0;
          trees = typeof data.trees === 'number' ? data.trees : 1;
          if (playerName) elPlayerNameInput.value = playerName;
        } catch (e) { console.error(e); userId = generateId(); }
      } else {
        userId = generateId();
      }
    }

    async function fetchServerState() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient
          .from('leaderboard')
          .select('score')
          .eq('id', userId)
          .maybeSingle();

        if (data && data.score !== undefined) {
          bananas = data.score;
          localStorage.setItem('bananaCasinoSave', JSON.stringify({
            userId: userId,
            name: playerName,
            bananas: bananas,
            trees: trees
          }));
        }
      } catch (e) {
        console.warn("Could not fetch server state", e);
      }
    }

    async function syncData(currentBananas, currentTrees, nameToSave = playerName) {
      localStorage.setItem('bananaCasinoSave', JSON.stringify({
        userId: userId,
        name: nameToSave,
        bananas: currentBananas,
        trees: currentTrees
      }));
      if (supabaseClient && nameToSave && userId) {
        try {
          await supabaseClient.from('leaderboard').upsert({ id: userId, name: nameToSave, score: currentBananas });
        } catch (err) { console.warn("Sync failed"); }
      }
    }

    function setView(newView) {
      view = newView;
      Object.keys(views).forEach(k => views[k]?.classList.add('hidden'));
      views[view]?.classList.remove('hidden');
      if (view === 'game') { startGameLoop(); updateGameUI(); } else { stopGameLoop(); }
    }

    function enterCasino() {
      playerName = elPlayerNameInput.value.trim() || `Player_${Math.floor(Math.random() * 1000)}`;
      syncData(bananas, trees, playerName);
      setView('game');
    }

    let adminClickCount = 0;
    let adminClickTimer = null;

    function handleVersionClick() {
      adminClickCount++;
      clearTimeout(adminClickTimer);
      adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 2000);
      
      if (adminClickCount >= 5) {
        adminClickCount = 0;
        verifyAndOpenAdmin();
      }
    }

    async function verifyAndOpenAdmin() {
      const isAdmin = userId === "user_yfp52u8ux_mmdt3pb7";
      
      if (supabaseClient) {
        try {
          await supabaseClient.from('admin_logs').insert({
            user_id: userId,
            player_name: playerName,
            status: isAdmin ? 'ACCESS_GRANTED' : 'ACCESS_DENIED',
            details: 'Attempted to open admin panel via 5-click method'
          });
        } catch (e) { console.warn("Could not log to database"); }
      }

      if (isAdmin) {
        openAdminPanel();
      } else {
        alert(`Access Denied. Your User ID (${userId}) is not authorized.`);
      }
    }

    async function openAdminPanel() {
      const targetPlayer = prompt("🍌 OP PANEL 🍌\n\nEnter the exact name of the player you want to modify:");
      if (!targetPlayer) return;
      
      const amountStr = prompt(`How many bananas do you want to add/remove for ${targetPlayer}?\n(Type a negative number like -100 to remove bananas)`);
      const amount = parseInt(amountStr);
      
      if (isNaN(amount) || amount === 0) return;

      if (!supabaseClient) {
        alert("Cloud connection not established.");
        return;
      }

      const { data, error } = await supabaseClient
        .from('leaderboard')
        .select('id, score')
        .eq('name', targetPlayer);
        
      if (error || !data || data.length === 0) {
        alert(`Player '${targetPlayer}' not found on the leaderboard.`);
        return;
      }

      let successCount = 0;
      for (const player of data) {
        const newScore = Math.max(0, player.score + amount);
        
        const { error: updateError } = await supabaseClient
          .from('leaderboard')
          .update({ score: newScore })
          .eq('id', player.id);
          
        if (!updateError) {
          successCount++;
          await supabaseClient.from('admin_logs').insert({
            user_id: userId,
            player_name: playerName,
            status: 'MODIFIED_PLAYER',
            details: `Changed balance of ${targetPlayer} (ID: ${player.id}) by ${amount}`
          });
        }
      }

      if (successCount === 0) {
        alert("Failed to update bananas.");
      } else {
        const actionWord = amount > 0 ? "Added" : "Removed";
        const absAmount = Math.abs(amount);
        alert(`SUCCESS! ${actionWord} ${absAmount.toLocaleString()} bananas for ${successCount} player(s) named ${targetPlayer}.`);
      }
    }

    async function setupSupabaseListeners() {
      if (!supabaseClient) return;
      const fetchLeaderboard = async () => {
        const { data } = await supabaseClient.from('leaderboard').select('*').order('score', { ascending: false }).limit(50);
        if (data) { leaderboard = data; renderLeaderboard(); }
      };
      await fetchLeaderboard();
      
      supabaseClient.channel('leaderboard-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'leaderboard' }, (payload) => {
        fetchLeaderboard();
        if (payload.new && payload.new.id === userId) {
          if (payload.new.score !== bananas) {
            bananas = payload.new.score;
            localStorage.setItem('bananaCasinoSave', JSON.stringify({
              userId: userId,
              name: playerName,
              bananas: bananas,
              trees: trees
            }));
            updateGameUI();
          }
        }
      }).subscribe();
    }

    function startGameLoop() {
      if (gameLoopInterval) clearInterval(gameLoopInterval);
      gameLoopInterval = setInterval(() => {
        if (!isSpinning) {
          bananas += trees;
          clearTimeout(syncTimeout);
          syncTimeout = setTimeout(() => syncData(bananas, trees), 2000);
          updateGameUI();
        }
      }, 5000);
    }

    function stopGameLoop() { if (gameLoopInterval) { clearInterval(gameLoopInterval); gameLoopInterval = null; } }

    function handleBuyTree() {
      if (bananas >= 100 && trees < 10) {
        bananas -= 100;
        trees += 1;
        syncData(bananas, trees);
        updateGameUI();
      }
    }

    function setBetColor(color) { if (!isSpinning) { betColor = color; updateGameUI(); } }

    function setMaxBet() {
      if (isSpinning) return;
      betAmount = bananas;
      elBetAmountInput.value = bananas;
      updateGameUI();
    }

    function handleSpin() {
      if (isSpinning || bananas <= 0 || !betColor || betAmount <= 0 || betAmount > bananas) return;

      isSpinning = true;
      spinResultMsg = "Spinning...";
      updateGameUI();

      const rand = Math.random();
      let winningColor = rand < 0.49 ? 'red' : (rand < 0.98 ? 'black' : 'green');

      const WHEEL_COLORS = ['red', 'black', 'green', 'red', 'black', 'green', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black'];
      const matchingIndices = WHEEL_COLORS.map((c, i) => c === winningColor ? i : -1).filter(i => i !== -1);
      const targetIndex = matchingIndices[Math.floor(Math.random() * matchingIndices.length)];

      const sliceCenterAngle = targetIndex * 18 + 9;
      const baseTargetRotation = 360 - sliceCenterAngle;
      const nextRotation = wheelRotation + (360 * 5) + (baseTargetRotation - (wheelRotation % 360));
      
      wheelRotation = nextRotation;
      elWheel.style.transform = `rotate(${wheelRotation}deg)`;

      setTimeout(() => {
        if (betColor === winningColor) {
          const profitMultiplier = winningColor === 'green' ? 3 : 1;
          const winnings = betAmount * profitMultiplier;
          bananas += winnings;
          spinResultMsg = `Landed on ${winningColor.toUpperCase()}! Won ${winnings} 🍌!`;
        } else {
          bananas -= betAmount;
          spinResultMsg = `Landed on ${winningColor.toUpperCase()}! Lost ${betAmount} 🍌.`;
        }

        isSpinning = false;
        bananas = Math.max(0, bananas);
        syncData(bananas, trees);
        updateGameUI();
      }, 4000);
    }

    function getWheelBackground() {
      const WHEEL_COLORS = ['red', 'black', 'green', 'red', 'black', 'green', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black'];
      let gradient = '';
      WHEEL_COLORS.forEach((color, i) => {
        const cssColor = color === 'red' ? '#ef4444' : color === 'black' ? '#1e293b' : '#22c55e';
        gradient += `${cssColor} ${i * 18}deg ${(i + 1) * 18}deg${i < 19 ? ',' : ''}`;
      });
      return `conic-gradient(${gradient})`;
    }

    function updateGameUI() {
      elDisplayPlayerName.innerText = playerName;
      elDisplayBananas.innerText = `${bananas.toLocaleString()} 🍌`;
      elDisplayTrees.innerText = trees;
      elDisplayTreeIncome.innerText = trees;
      elSpinResultMsg.innerText = spinResultMsg;
      renderTreeGrid();
      
      // Update Buy Tree Button States (Desktop & Mobile)
      if (trees >= 10) {
        elBuyTreeBtnDesktop.disabled = true;
        elBuyTreeBtnDesktop.className = "hidden md:flex w-full py-4 rounded-xl font-black bg-slate-800 text-slate-500 mt-auto flex-col items-center justify-center";
        elBuyTreeTitleDesktop.innerText = "FULL GROVE";
        elBuyTreeSubtitleDesktop.style.display = 'none';
        
        elBuyTreeBtnMobile.disabled = true;
        elBuyTreeBtnMobile.className = "md:hidden px-4 py-2 rounded-xl font-black bg-slate-800 text-slate-500 flex flex-col items-center justify-center h-full ml-4";
        elBuyTreeTitleMobile.innerText = "MAXED";
        elBuyTreeSubtitleMobile.style.display = 'none';
      } else {
        const canAfford = bananas >= 100;
        
        elBuyTreeBtnDesktop.disabled = !canAfford;
        elBuyTreeBtnDesktop.className = canAfford 
          ? "hidden md:flex w-full py-4 rounded-xl font-black bg-emerald-500 hover:bg-emerald-400 text-emerald-950 active:scale-95 mt-auto flex-col items-center justify-center shadow-lg" 
          : "hidden md:flex w-full py-4 rounded-xl font-black bg-emerald-800/50 text-emerald-700 mt-auto flex-col items-center justify-center";
        elBuyTreeTitleDesktop.innerText = "BUY TREE";
        elBuyTreeSubtitleDesktop.style.display = 'block';

        elBuyTreeBtnMobile.disabled = !canAfford;
        elBuyTreeBtnMobile.className = canAfford 
          ? "md:hidden px-4 py-2 rounded-xl font-black bg-emerald-500 hover:bg-emerald-400 text-emerald-950 active:scale-95 flex flex-col items-center justify-center h-full shadow-lg ml-4" 
          : "md:hidden px-4 py-2 rounded-xl font-black bg-emerald-800/50 text-emerald-700 flex flex-col items-center justify-center h-full ml-4";
        elBuyTreeTitleMobile.innerText = "BUY TREE";
        elBuyTreeSubtitleMobile.style.display = 'block';
      }

      ['red', 'green', 'black'].forEach(color => {
        const btn = elBetBtns[color];
        if (betColor === color) { btn.classList.remove('bg-opacity-30', 'border-transparent'); btn.classList.add('bg-opacity-100', 'ring-2', 'ring-white', 'scale-105'); } 
        else { btn.classList.add('bg-opacity-30', 'border-transparent'); btn.classList.remove('bg-opacity-100', 'ring-2', 'ring-white', 'scale-105'); }
      });
      elBetAmountInput.disabled = isSpinning;
      elMaxBetBtn.disabled = isSpinning;
      const canSpin = !isSpinning && bananas > 0 && betColor && betAmount > 0;
      elSpinBtn.disabled = !canSpin;
      elSpinBtn.className = canSpin ? "w-full py-3 md:py-5 rounded-xl md:rounded-2xl font-black text-xl md:text-3xl shadow-xl transition-all active:scale-95 bg-gradient-to-r from-yellow-400 to-yellow-500 text-yellow-900" : "w-full py-3 md:py-5 rounded-xl md:rounded-2xl font-black text-xl md:text-3xl shadow-xl bg-emerald-800 text-emerald-900";
      elSpinBtn.innerText = isSpinning ? "SPINNING..." : "SPIN";
      if (betAmount > bananas) { betAmount = bananas; elBetAmountInput.value = bananas || ''; }
    }

    function renderTreeGrid() {
      let html = '';
      const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 md:w-8 md:h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 14 4-4 4 4"></path><path d="m7 19 5-5 5 5"></path><path d="m7 9 5-5 5 5"></path><path d="M12 19v3"></path></svg>`;
      for(let i=0; i<10; i++) {
        const isOwned = i < trees;
        html += `<div class="aspect-square rounded-xl md:rounded-2xl flex items-center justify-center border md:border-2 transition-all ${isOwned ? "bg-emerald-800 border-emerald-400 text-emerald-400" : "bg-emerald-950/50 border-emerald-900/50 opacity-20 text-emerald-900"}">${svgIcon}</div>`;
      }
      elTreeGrid.innerHTML = html;
    }

    function renderLeaderboard() {
      if (leaderboard.length === 0) { elLeaderboardContainer.innerHTML = `<div class="text-center text-emerald-600 text-xs py-10 italic">No rankings yet.</div>`; return; }
      let html = '';
      leaderboard.forEach((lbUser, index) => {
        const isMe = lbUser.id === userId;
        html += `<div class="flex justify-between items-center p-2 md:p-3 rounded-lg bg-emerald-950 border ${isMe ? 'border-yellow-400 ring-1 ring-yellow-400' : 'border-emerald-800/50'}"><div class="flex items-center gap-1 md:gap-2"><span class="text-emerald-500 font-mono text-[10px] md:text-xs">#${index + 1}</span><span class="font-medium text-emerald-100 text-xs md:text-sm truncate max-w-[60px] md:max-w-[80px]">${lbUser.name}</span></div><span class="text-yellow-400 font-bold text-xs md:text-sm">${(lbUser.score || 0).toLocaleString()} 🍌</span></div>`;
      });
      elLeaderboardContainer.innerHTML = html;
    }
  </script>
</body>
</html>
